name: Generate CycloneDX BOMs

on:
  schedule:
    - cron: "*/5 * * * *"

  repository_dispatch:
    types:
      - run-sbom-scan

permissions:
  contents: write

jobs:
  generate-sbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install OpenGrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/v1.25.0/install.sh | bash
          echo "$HOME/.opengrep/cli/latest" >> $GITHUB_PATH

      - name: Install CryptoFinder
        run: |
          go install github.com/scanoss/crypto-finder/cmd/crypto-finder@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install SCANOSS CLI
        run: |
          python3 -m pip install --upgrade pip
          pip3 install scanoss

      - name: Verify Installation
        run: |
          export PATH="$HOME/.opengrep/cli/latest:$PATH"

          which opengrep
          opengrep --version

          which crypto-finder
          crypto-finder version

          which scanoss-py
          scanoss-py --help

      - name: Create Reports Directory
        run: |
          mkdir -p reports/SBOM
          mkdir -p reports/CBOM

      - name: Generate SBOM and CBOM
        env:
          SCANOSS_API_KEY: ${{ secrets.SCANOSS_API_KEY }}
        run: |
          export PATH="$HOME/.opengrep/cli/latest:$PATH"

          TODAY=$(date +%F)

          REPOS=(
            "https://github.com/premchandoffice/integration-github-actions.git"
            "https://github.com/scanoss/scanoss.py.git"
          )

          for REPO in "${REPOS[@]}"
          do
            NAME=$(basename "$REPO" .git)

            echo "=================================="
            echo "Scanning: $NAME"
            echo "=================================="

            git clone --depth 1 "$REPO" "$NAME"

            scanoss-py scan \
              "$NAME" \
              --format cyclonedx \
              --output "reports/SBOM/${TODAY}_${NAME}.cdx.json"

            crypto-finder scan \
              --api-key "$SCANOSS_API_KEY" \
              --format cyclonedx \
              --output "reports/CBOM/${TODAY}_${NAME}.cbom.json" \
              "$NAME"

            rm -rf "$NAME"
          done

      - name: Commit Reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reports

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Add CycloneDX reports"
            git push
          fi
