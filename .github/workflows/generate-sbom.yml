name: Generate CBOM

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

  repository_dispatch:
    types:
      - run-cbom-scan

permissions:
  contents: write

jobs:
  generate-cbom:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install CryptoFinder
        run: |
          go install github.com/scanoss/crypto-finder/cmd/crypto-finder@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Show CryptoFinder Version
        run: |
          crypto-finder version || true

      - name: Create CBOM Directory
        run: |
          mkdir -p reports/CBOM

      - name: Generate CBOMs
        shell: bash
        env:
          SCANOSS_API_KEY: ${{ secrets.SCANOSS_API_KEY }}
        run: |
          set -e

          TODAY=$(date +%F)

          REPOS=(
            "https://github.com/premchandoffice/integration-github-actions.git"
            "https://github.com/gayathri02-02/project1.git"
          )

          for REPO in "${REPOS[@]}"
          do
            REPO=$(echo "$REPO" | xargs)
            NAME=$(basename "$REPO" .git)

            echo "=================================="
            echo "Scanning: $NAME"
            echo "=================================="

            rm -rf "$NAME"

            git clone --depth 1 "$REPO" "$NAME"

            crypto-finder scan \
              "$NAME" \
              --output "reports/CBOM/${TODAY}_${NAME}_cbom.json"

            rm -rf "$NAME"

          done

      - name: Upload CBOM Reports
        uses: actions/upload-artifact@v4
        with:
          name: cbom-reports
          path: reports/CBOM
          retention-days: 90

      - name: Commit CBOM Reports
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reports/CBOM

          if git diff --cached --quiet
          then
            echo "No changes."
          else
            git commit -m "Update CBOM reports ($(date +%F))"
            git push
          fi
